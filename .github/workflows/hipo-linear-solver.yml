name: hipo-linear-solver

on: [push, pull_request]

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Release]
        all_tests: [OFF]

    steps:
      - uses: actions/checkout@v6

      - name: Install OpenBLAS
        shell: bash
        run: |
          sudo apt update
          sudo apt install libopenblas-dev

      - name: Create Build Environment
        run: cmake -E make_directory ${{github.workspace}}/build

      - name: Create install
        working-directory: ${{github.workspace}}
        run: mkdir install

      - name: Configure CMake
        working-directory: ${{github.workspace}}/build
        run: |
          cmake $GITHUB_WORKSPACE -DHIPO=ON \
          -DFAST_BUILD=ON -DBUILD_OPENBLAS=OFF \
          -DBLA_VENDOR=OpenBLAS -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/install

      - name: Build
        working-directory: ${{github.workspace}}/build
        run: |
          cmake --build . --parallel

      - name: install
        working-directory: ${{github.workspace}}/build
        run: cmake --install .

      - name: Print config
        working-directory: ${{github.workspace}}/build
        run: cat HConfig.h

      - name: Compile example
        working-directory: ${{github.workspace}}
        run: |
          gcc highs/ipm/hipo/factorhighs/reproducer.c \
          -o example -Iinstall/include/highs -Linstall/lib -lhighs

      - name: Run example
        working-directory: ${{github.workspace}}
        run: |
          export LD_LIBRARY_PATH=install/lib:build/lib
          ./example ; echo "exit code: $?"